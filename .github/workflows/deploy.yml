name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token for the OIDC-based Pages deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one in-flight Pages deploy at a time; don't cancel a running deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      # Quality gates run before the network-heavy vendor step so a red suite fails fast and never
      # ships. Both are hermetic — eslint and the Vitest suite read committed fixtures, not the
      # vendored Pyodide/DuckDB assets — so they need no vendoring.
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm test
      # Order matters: `vendor` reads the Pyodide version from node_modules/pyodide,
      # so it must run after `npm ci` and before `build`. Network is needed here only.
      - name: Vendor Pyodide runtime (self-hosted, offline)
        run: npm run vendor
      - name: Build
        run: npm run build
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
